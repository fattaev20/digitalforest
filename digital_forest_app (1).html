<head>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:#111;color:#fff;min-height:100vh;overflow-x:hidden;}
@keyframes dfFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes dfSlideRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes dfToast{0%{transform:translateX(120%);opacity:0}10%{transform:translateX(0);opacity:1}85%{transform:translateX(0);opacity:1}100%{transform:translateX(120%);opacity:0}}
@keyframes dfBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.df-btn{cursor:pointer;border:none;transition:transform .1s,filter .2s;background:none;}
.df-btn:active{transform:scale(.97);}
.df-btn:hover{filter:brightness(1.1);}
.df-page{animation:dfFadeUp .4s ease both;}
.df-card{animation:dfFadeUp .4s ease both;}
.df-panel{animation:dfSlideRight .35s cubic-bezier(.34,1.56,.64,1) both;}
.df-toast{animation:dfToast 3.2s ease forwards;}
.df-bounce{animation:dfBounce 1.5s ease infinite;}
.slink{transition:background .15s;cursor:pointer;}
.slink:hover{background:#2a2a2a !important;}
.tmarker{cursor:pointer;transition:transform .2s;}
.tmarker:hover{transform:scale(1.35) translateY(-5px);}
.dfinput{background:#222;border:1.5px solid #333;border-radius:12px;color:#fff;padding:10px 14px;width:100%;font-size:14px;outline:none;transition:border-color .2s;font-family:inherit;}
.dfinput:focus{border-color:#CCFF00;}
.dfsel{background:#222;border:1.5px solid #333;border-radius:12px;color:#fff;padding:10px 14px;font-size:14px;outline:none;cursor:pointer;font-family:inherit;}
.dftarea{background:#222;border:1.5px solid #333;border-radius:12px;color:#fff;padding:10px 14px;width:100%;font-size:14px;outline:none;resize:vertical;font-family:inherit;}
.dftarea:focus{border-color:#CCFF00;}
.sc::-webkit-scrollbar{width:4px;}
.sc::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
</style>
</head>
<body>

<script>
(function(){

  {id:6,name:'Elm Tree',species:'Ulmus minor',status:'Needs Water',planted:'2023-07-12',org:'City Parks Dept',co2:34,waterings:8,lastCared:6,health:61,x:18,y:32},

  {id:8,name:'Walnut',species:'Juglans regia',status:'Newly Planted',planted:'2024-03-15',org:'Youth Green',co2:8,waterings:4,lastCared:2,health:82,x:68,y:18},

  {id:10,name:'Cherry Plum',species:'Prunus cerasifera',status:'Needs Care',planted:'2023-08-22',org:'City Parks Dept',co2:22,waterings:5,lastCared:18,health:29,x:8,y:62},
  {id:11,name:'Linden',species:'Tilia cordata',status:'Healthy & Growing',planted:'2022-11-14',org:'EcoUz',co2:78,waterings:22,lastCared:2,health:87,x:35,y:25},
  {id:12,name:'Ash Tree',species:'Fraxinus excelsior',status:'Needs Water',planted:'2023-10-07',org:'Youth Green',co2:19,waterings:4,lastCared:10,health:48,x:92,y:72},
  {id:13,name:'Hornbeam',species:'Carpinus betulus',status:'Newly Planted',planted:'2024-05-01',org:'GreenUz Foundation',co2:3,waterings:2,lastCared:0,health:75,x:78,y:12},
  {id:14,name:'Wild Pear',species:'Pyrus communis',status:'Healthy & Growing',planted:'2023-02-14',org:'EcoUz',co2:55,waterings:16,lastCared:3,health:91,x:28,y:82},
  {id:15,name:'Black Locust',species:'Robinia pseudoacacia',status:'Needs Care',planted:'2022-07-30',org:'City Parks Dept',co2:44,waterings:10,lastCared:20,health:35,x:48,y:8}
].map(function(t){return Object.assign({},t,{color:tcolor(t.status)});});
var NOTIFS=[
  {id:1,text:'Oak #3 needs watering',time:'2h ago',icon:'🟠',read:false},
  {id:2,text:'You earned the Eco Warrior badge!',time:'1d ago',icon:'🏆',read:false},
  {id:3,text:'New event: Community Planting Day',time:'2d ago',icon:'🌱',read:true},
  {id:4,text:'Your tree was cared for by another user',time:'3d ago',icon:'💚',read:true}
];
var EVENTS=[
  {id:1,title:'Community Planting Day',date:'2026-03-20',type:'Tree Planting',location:'Amir Temur Square',org:'GreenUz Foundation',joined:false},
  {id:2,title:'Watering Action — Mirzo Ulugbek',date:'2026-03-25',type:'Watering Action',location:'Mirzo Ulugbek District',org:'Youth Green',joined:false},
  {id:3,title:'Eco Education Workshop',date:'2026-04-05',type:'Educational',location:'National University',org:'EcoUz',joined:true},
  {id:4,title:'Spring Clean-Up Drive',date:'2026-04-12',type:'Cleaning Drive',location:'Botanical Garden',org:'City Parks Dept',joined:false}
];
var ACHV=[
  {id:1,name:'First Tree',icon:'🌱',desc:'Plant your first tree',points:50,unlocked:true,progress:100},
  {id:2,name:'Tree Caretaker',icon:'💧',desc:'Water 10 trees',points:100,unlocked:true,progress:100},
  {id:3,name:'Eco Warrior',icon:'⚔️',desc:'Complete 20 eco actions',points:200,unlocked:true,progress:100},
  {id:4,name:'Nature Champion',icon:'🏆',desc:'Reach 1,000 Eco Points',points:300,unlocked:false,progress:85},
  {id:5,name:'Community Hero',icon:'🤝',desc:'Join 5 community events',points:400,unlocked:false,progress:40},
  {id:6,name:'Green Legend',icon:'🌳',desc:'Plant 50 trees total',points:1000,unlocked:false,progress:24}
];
var S={page:'login',loginRole:'user',email:'',password:'',showPw:false,user:null,trees:TREES.slice(),selectedTree:null,ecoPoints:1247,notifOpen:false,avatarOpen:false,filterStatus:'All',notifications:NOTIFS.slice(),events:EVENTS.map(function(e){return Object.assign({},e);}),logType:'🌱 Tree Planting',logDesc:'',logLoc:'',addModal:false,newTree:{name:'',species:'',org:'',date:'',status:'Newly Planted'},sq:'',sf:'All',tid:0};
function toast(msg){var tc=document.getElementById('toasts');if(!tc)return;var e=document.createElement('div');e.className='df-toast';e.style.cssText='background:#1A1A1A;border:1.5px solid '+LIME+';color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;font-weight:600;white-space:nowrap;pointer-events:auto;box-shadow:0 4px 20px rgba(0,0,0,.5);';e.textContent=msg;tc.appendChild(e);setTimeout(function(){if(tc.contains(e))tc.removeChild(e);},3200);}
function mk(tag,props,html){var e=document.createElement(tag);if(props)Object.keys(props).forEach(function(k){if(k==='cls')e.className=props[k];else if(k==='css')e.style.cssText=props[k];else e[k]=props[k];});if(html)e.innerHTML=html;return e;}
function R(){var app=document.getElementById('app');if(!app)return;app.innerHTML='';app.appendChild(S.user?dash():login());}

/* LOGIN */
function login(){
  var w=mk('div',{css:'display:flex;min-height:100vh;'});
  var left=mk('div',{css:'background:'+LIME+';width:42%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;position:relative;overflow:hidden;'},
    '<div style="position:absolute;top:-80px;left:-80px;width:260px;height:260px;border-radius:50%;background:rgba(0,0,0,.07);"></div>'+
    '<div style="position:absolute;bottom:-100px;right:-50px;width:300px;height:300px;border-radius:50%;background:rgba(0,0,0,.05);"></div>'+
    '<div style="animation:dfFadeUp .5s ease both;text-align:center;position:relative;z-index:1;">'+
    '<div style="font-size:72px;margin-bottom:12px;">🌲</div>'+
    '<div style="font-size:32px;font-weight:700;color:#111;letter-spacing:-1px;">Digital Forest</div>'+
    '<div style="font-size:15px;color:#1a3300;margin-top:10px;line-height:1.7;">Grow. Protect. Sustain.<br>Uzbekistan\'s green future.</div>'+
    '<div style="display:flex;gap:14px;margin-top:28px;justify-content:center;">'+
    ['🌲 12,847 Trees','💧 47,320 Waterings','🌿 892 Members'].map(function(t){return '<div style="background:rgba(0,0,0,.12);border-radius:14px;padding:11px 14px;text-align:center;font-size:12px;color:#1a3300;font-weight:700;">'+t+'</div>';}).join('')+
    '</div></div>');
  var right=mk('div',{css:'flex:1;background:#fff;display:flex;align-items:center;justify-content:center;padding:48px;'});
  var form=mk('div',{css:'width:100%;max-width:380px;animation:dfFadeUp .5s .1s ease both;opacity:0;'},
    '<div style="font-size:26px;font-weight:700;color:#111;margin-bottom:4px;">Welcome back 👋</div>'+
    '<div style="font-size:14px;color:#666;margin-bottom:22px;">Sign in to your Digital Forest account</div>'+
    '<div style="display:flex;background:#f5f5f5;border-radius:13px;padding:4px;margin-bottom:22px;">'+
    '<button id="tu" class="df-btn" style="flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:700;background:'+(S.loginRole==='user'?'#111':'transparent')+';color:'+(S.loginRole==='user'?'#fff':'#666')+';">👤 Login as User</button>'+
    '<button id="to" class="df-btn" style="flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:700;background:'+(S.loginRole==='org'?'#111':'transparent')+';color:'+(S.loginRole==='org'?'#fff':'#666')+';">🏢 Login as Org</button>'+
    '</div>'+
    '<div style="margin-bottom:14px;"><label style="font-size:13px;font-weight:600;color:#333;display:block;margin-bottom:6px;">Email</label>'+
    '<input id="le" class="dfinput" style="background:#f8f8f8;color:#111;border:1.5px solid #e5e5e5;" placeholder="'+(S.loginRole==='user'?'user@digitalforest.uz':'org@digitalforest.uz')+'" value="'+S.email+'"></div>'+
    '<div style="margin-bottom:6px;"><label style="font-size:13px;font-weight:600;color:#333;display:block;margin-bottom:6px;">Password</label>'+
    '<div style="position:relative;"><input id="lp" class="dfinput" type="'+(S.showPw?'text':'password')+'" style="background:#f8f8f8;color:#111;border:1.5px solid #e5e5e5;padding-right:44px;" placeholder="'+(S.loginRole==='user'?'user123':'org123')+'" value="'+S.password+'">'+
    '<button id="leye" class="df-btn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:18px;">'+(S.showPw?'🙈':'👁')+'</button></div></div>'+
    '<div style="text-align:right;margin-bottom:20px;"><span style="font-size:13px;color:#22C55E;cursor:pointer;font-weight:600;">Forgot password?</span></div>'+
    '<button id="lsub" class="df-btn" style="width:100%;padding:14px;background:'+LIME+';color:#111;border-radius:13px;font-size:15px;font-weight:700;">Sign In →</button>'+
    '<div style="text-align:center;margin-top:16px;font-size:13px;color:#666;">No account? <span style="color:#22C55E;font-weight:600;cursor:pointer;">Register</span></div>'+
    '<div style="margin-top:14px;background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:10px 14px;font-size:12px;color:#166534;"><strong>Demo:</strong> '+(S.loginRole==='user'?'user@digitalforest.uz / user123':'org@digitalforest.uz / org123')+'</div>');
  right.appendChild(form);w.appendChild(left);w.appendChild(right);
  setTimeout(function(){
    var le=w.querySelector('#le'),lp=w.querySelector('#lp'),tu=w.querySelector('#tu'),to2=w.querySelector('#to'),eye=w.querySelector('#leye'),sub=w.querySelector('#lsub');
    if(le)le.oninput=function(e){S.email=e.target.value;};
    if(lp)lp.oninput=function(e){S.password=e.target.value;};
    if(tu)tu.onclick=function(){S.loginRole='user';S.email='';S.password='';R();};
    if(to2)to2.onclick=function(){S.loginRole='org';S.email='';S.password='';R();};
    if(eye)eye.onclick=function(){S.showPw=!S.showPw;R();};
    if(sub)sub.onclick=function(){var acc=ACCOUNTS[S.email];if(acc&&acc.password===S.password){S.user=Object.assign({email:S.email},acc);S.page='map';R();}else toast('❌ Invalid credentials — check the demo hint');};
  },40);
  return w;
}

/* DASHBOARD SHELL */
function dash(){
  var w=mk('div',{css:'display:flex;flex-direction:column;min-height:100vh;background:#111;'});
  w.appendChild(navbar());
  var body=mk('div',{css:'display:flex;flex:1;overflow:hidden;height:calc(100vh - 58px);'});
  body.appendChild(sidebar());
  var content=mk('div',{css:'flex:1;overflow-y:auto;',cls:'sc'});
  content.appendChild(page());
  body.appendChild(content);
  w.appendChild(body);
  return w;
}

/* NAVBAR */
function navbar(){
  var isOrg=S.user&&S.user.role==='org';
  var unread=S.notifications.filter(function(n){return!n.read;}).length;
  var titles={map:'🗺 Tree Map',dashboard:'🏠 Dashboard',logaction:'📝 Log Action',rewards:'🎁 Earn Rewards',events:'📅 Events',achievements:'🏆 Achievements',managetrees:'🌲 Manage Trees',analytics:'📊 Analytics'};
  var nav=mk('div',{css:'background:'+CARD+';border-bottom:1px solid '+BORDER+';padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:200;'});

  var ctr=mk('div',{css:'font-size:15px;font-weight:600;'});ctr.textContent=titles[S.page]||'Dashboard';
  var rr=mk('div',{css:'display:flex;align-items:center;gap:14px;position:relative;'},
    '<div style="background:#1a2a0a;border:1px solid #2d5a0a;border-radius:20px;padding:5px 14px;font-size:13px;font-weight:700;color:'+LIME+';">🌿 '+S.ecoPoints.toLocaleString()+' pts</div>'+
    '<div id="nb" style="position:relative;cursor:pointer;font-size:22px;">🔔'+(unread>0?'<div style="position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;">'+unread+'</div>':'')+'</div>'+
    '<div id="ab" style="width:36px;height:36px;border-radius:50%;background:'+LIME+';color:#111;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer;">'+S.user.avatar+'</div>');
  if(S.notifOpen){
    var nd=mk('div',{css:'position:absolute;top:50px;right:50px;background:'+CARD+';border:1px solid '+BORDER+';border-radius:16px;width:310px;z-index:500;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6);'},
      '<div style="padding:14px 16px;border-bottom:1px solid '+BORDER+';display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:700;font-size:14px;">Notifications</span><span id="mr" style="font-size:12px;color:'+LIME+';cursor:pointer;font-weight:700;">Mark all read</span></div>'+
      S.notifications.map(function(n){return'<div style="padding:12px 16px;border-bottom:1px solid '+BORDER+';display:flex;gap:10px;background:'+(n.read?'transparent':'rgba(204,255,0,.03)');+'"><span style="font-size:18px;">'+n.icon+'</span><div><div style="font-size:13px;color:'+(n.read?MUTED:'#fff')+';font-weight:'+(n.read?400:600)+';">'+n.text+'</div><div style="font-size:11px;color:'+MUTED+';margin-top:2px;">'+n.time+'</div></div></div>';}).join(''));
    rr.appendChild(nd);
    setTimeout(function(){var mr=nd.querySelector('#mr');if(mr)mr.onclick=function(){S.notifications=S.notifications.map(function(n){return Object.assign({},n,{read:true});});S.notifOpen=false;R();};},20);
  }
  if(S.avatarOpen){
    var ad=mk('div',{css:'position:absolute;top:50px;right:0;background:'+CARD+';border:1px solid '+BORDER+';border-radius:14px;width:210px;z-index:500;overflow:hidden;'},

      '<button id="lo" class="df-btn" style="width:100%;padding:12px 16px;text-align:left;font-size:13px;color:#ef4444;">🚪 Logout</button>');
    rr.appendChild(ad);
    setTimeout(function(){var lb=ad.querySelector('#lo');if(lb)lb.onclick=function(){S.user=null;S.page='login';S.avatarOpen=false;R();};},20);
  }
  nav.appendChild(ll);nav.appendChild(ctr);nav.appendChild(rr);
  setTimeout(function(){
    var nb=nav.querySelector('#nb'),ab=nav.querySelector('#ab');
    if(nb)nb.onclick=function(){S.notifOpen=!S.notifOpen;S.avatarOpen=false;R();};

/* SIDEBAR */
function sidebar(){
  var isOrg=S.user&&S.user.role==='org';
  var items=[{id:'dashboard',icon:'🏠',label:'Dashboard'},{id:'map',icon:'🗺',label:'Tree Map'},{id:isOrg?'managetrees':'logaction',icon:isOrg?'🌲':'📝',label:isOrg?'Manage Trees':'Log Action'},{id:'events',icon:'📅',label:'Events'},{id:isOrg?'analytics':'achievements',icon:isOrg?'📊':'🏆',label:isOrg?'Analytics':'Achievements'}];
  if(!isOrg)items.push({id:'rewards',icon:'🎁',label:'Earn Rewards'});
  var sb=mk('div',{css:'width:210px;background:'+CARD+';border-right:1px solid '+BORDER+';flex-shrink:0;display:flex;flex-direction:column;padding:12px 0;overflow-y:auto;',cls:'sc'},
    '<div style="padding:12px 14px 16px;border-bottom:1px solid '+BORDER+';margin-bottom:8px;"><div style="display:flex;align-items:center;gap:10px;">'+
    '<div style="width:38px;height:38px;border-radius:50%;background:'+LIME+';color:#111;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">'+S.user.avatar+'</div>'+
    '<div><div style="font-size:13px;font-weight:700;">'+S.user.name.split(' ')[0]+'</div>'+
    '<div style="font-size:10px;background:'+(isOrg?'#1a2a6a':'#0a2a1a')+';color:'+(isOrg?'#7dd3fc':LIME)+';padding:2px 7px;border-radius:20px;display:inline-block;margin-top:2px;">'+(isOrg?'Eco Organizer':'Eco Guardian')+'</div></div></div></div>'+
    items.map(function(item){return'<div class="slink" data-pg="'+item.id+'" style="display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:10px;background:'+(S.page===item.id?LIME:'transparent')+';color:'+(S.page===item.id?'#111':'#ccc')+';font-size:13px;font-weight:'+(S.page===item.id?700:400)+';"><span style="font-size:16px;">'+item.icon+'</span>'+item.label+'</div>';}).join(''));

  return sb;

    '<div style="font-size:20px;font-weight:700;">'+t.name+'</div>'+
    '<div style="font-size:13px;color:'+MUTED+';font-style:italic;margin-bottom:14px;">'+t.species+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">'+
    [['📅','Planted',t.planted],['🏢','By',t.org.split(' ').slice(0,2).join(' ')],['💨','CO₂',t.co2+' kg'],['💧','Waterings',t.waterings]].map(function(x){return'<div style="background:#222;border-radius:10px;padding:10px;"><div style="font-size:16px;">'+x[0]+'</div><div style="font-size:11px;color:'+MUTED+';margin-top:2px;">'+x[1]+'</div><div style="font-size:13px;font-weight:700;margin-top:1px;">'+x[2]+'</div></div>';}).join('')+

    '<div style="font-size:12px;color:'+MUTED+';margin-bottom:14px;">📍 Tashkent, Uzbekistan &nbsp;|&nbsp; ⏱ Last cared: '+(t.lastCared===0?'Today':t.lastCared===1?'Yesterday':t.lastCared+'d ago')+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">'+
    (isOrg?[['✏️','Edit Info'],['🗑','Delete'],['📷','Upload Photo'],['📊','Analytics']].map(function(x){return'<button class="df-btn ta" data-a="'+x[1]+'" style="background:#222;border:1px solid '+BORDER+';color:#fff;padding:9px;border-radius:12px;font-size:12px;font-weight:600;">'+x[0]+' '+x[1]+'</button>';}).join(''):
    [['💧','Water Tree'],['🛡','Protect Tree'],['✂️','Maintenance'],['📷','Upload Photo']].map(function(x){return'<button class="df-btn ta" data-a="'+x[1]+'" style="background:#0a2a0a;border:1px solid #1a4a1a;color:'+LIME+';padding:9px;border-radius:12px;font-size:12px;font-weight:600;">'+x[0]+' '+x[1]+'</button>';}).join(''))+

function addModal(){
  var ov=mk('div',{css:'position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;'});
  var mo=mk('div',{css:'background:'+CARD+';border:1px solid '+BORDER+';border-radius:20px;padding:24px;width:380px;max-height:90%;overflow-y:auto;animation:dfFadeUp .3s ease both;',cls:'sc'},

    '<div style="background:#1a2a0a;border:1px dashed #2d5a0a;border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;font-size:13px;color:'+LIME+';">📍 Click on the map to set location<br><span style="color:'+MUTED+';font-size:11px;">lat: 41.2995, lng: 69.2401</span></div>'+
    [['Tree Name','name','text'],['Species','species','text'],['Organization','org','text'],['Planting Date','date','date']].map(function(x){return'<div style="margin-bottom:12px;"><label style="font-size:12px;color:'+MUTED+';display:block;margin-bottom:5px;">'+x[0]+'</label><input class="dfinput nti" data-k="'+x[1]+'" type="'+x[2]+'" placeholder="'+x[0]+'" value="'+(S.newTree[x[1]]||'')+'"></div>';}).join('')+
    '<div style="margin-bottom:16px;"><label style="font-size:12px;color:'+MUTED+';display:block;margin-bottom:5px;">Status</label><select id="ns" class="dfsel" style="width:100%;">'+
    ['Newly Planted','Healthy & Growing','Needs Water','Needs Care'].map(function(s){return'<option value="'+s+'" '+(S.newTree.status===s?'selected':'')+'>'+s+'</option>';}).join('')+
    '</select></div>'+
    '<button id="st" class="df-btn" style="width:100%;background:'+LIME+';color:#111;padding:12px;border-radius:12px;font-weight:700;font-size:14px;">🌱 Add Tree to Forest</button>');
  ov.appendChild(mo);
  ov.onclick=function(e){if(e.target===ov){S.addModal=false;R();}};
  setTimeout(function(){
    mo.querySelector('#cm').onclick=function(){S.addModal=false;R();};
    mo.querySelector('#st').onclick=function(){
      var nid=Math.max.apply(null,S.trees.map(function(t){return t.id;}))+1;
      S.trees.push({id:nid,name:S.newTree.name||'New Tree',species:S.newTree.species||'Unknown',status:S.newTree.status,planted:S.newTree.date||new Date().toISOString().slice(0,10),org:S.newTree.org||'Digital Forest',co2:0,waterings:0,lastCared:0,health:80,x:Math.random()*78+11,y:Math.random()*78+11,color:tcolor(S.newTree.status)});
      S.addModal=false;S.newTree={name:'',species:'',org:'',date:'',status:'Newly Planted'};toast('🌱 New tree planted!');R();
    };
    mo.querySelectorAll('.nti').forEach(function(inp){inp.oninput=function(e){S.newTree[inp.dataset.k]=e.target.value;};});
    var ns=mo.querySelector('#ns');if(ns)ns.onchange=function(e){S.newTree.status=e.target.value;};
  },30);
  return ov;
}

function mgtPage(){

    '<div style="display:flex;gap:5px;"><button data-tid="'+t.id+'" class="df-btn vm" style="background:#1a2a0a;color:'+LIME+';padding:5px 8px;border-radius:8px;font-size:11px;font-weight:700;">🗺</button>'+

/* ANALYTICS */
function analyticsPage(){
  var totalCO2=S.trees.reduce(function(s,t){return s+t.co2;},0);
  var healthy=S.trees.filter(function(t){return t.status==='Healthy & Growing';}).length;
  var div=mk('div',{css:'padding:24px;',cls:'df-page'});
  div.innerHTML='<div style="font-size:20px;font-weight:700;margin-bottom:18px;">📊 Analytics Dashboard</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">'+
    [['💨','Total CO₂',totalCO2+' kg','#22C55E'],['👥','Volunteers','142','#3b82f6'],['✅','Survival Rate',Math.round(healthy/S.trees.length*100)+'%',LIME],['⚠️','Need Attention',S.trees.filter(function(t){return t.status==='Needs Care'||t.status==='Needs Water';}).length,'#ef4444']].map(function(x){return'<div style="background:'+CARD+';border:1px solid '+BORDER+';border-radius:14px;padding:16px;"><div style="font-size:24px;margin-bottom:4px;">'+x[0]+'</div><div style="font-size:24px;font-weight:700;color:'+x[3]+';">'+x[2]+'</div><div style="font-size:11px;color:'+MUTED+';margin-top:2px;">'+x[1]+'</div></div>';}).join('')+'</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">'+
    '<div style="background:'+CARD+';border:1px solid '+BORDER+';border-radius:16px;padding:20px;"><div style="font-weight:700;margin-bottom:12px;font-size:14px;">📈 Trees Planted (6 Months)</div><div id="cl" style="height:190px;"></div></div>'+
    '<div style="background:'+CARD+';border:1px solid '+BORDER+';border-radius:16px;padding:20px;"><div style="font-weight:700;margin-bottom:12px;font-size:14px;">🌲 Status Distribution</div><div id="cp" style="height:190px;"></div></div></div>'+
    '<div style="background:'+CARD+';border:1px solid '+BORDER+';border-radius:16px;padding:20px;"><div style="font-weight:700;margin-bottom:12px;font-size:14px;">🛠 Care Actions by Type</div><div id="cb" style="height:170px;"></div></div>';
  setTimeout(function(){
    if(typeof Recharts==='undefined'||typeof React==='undefined'||typeof ReactDOM==='undefined')return;
    var RC=Recharts,Cr=React,CrD=ReactDOM;
    var lineData=[{m:'Oct',v:2},{m:'Nov',v:3},{m:'Dec',v:1},{m:'Jan',v:4},{m:'Feb',v:2},{m:'Mar',v:3}];
    var pieData=[{n:'Healthy',v:S.trees.filter(function(t){return t.status==='Healthy & Growing';}).length,c:'#22C55E'},{n:'Needs Water',v:S.trees.filter(function(t){return t.status==='Needs Water';}).length,c:'#f97316'},{n:'New',v:S.trees.filter(function(t){return t.status==='Newly Planted';}).length,c:'#eab308'},{n:'Needs Care',v:S.trees.filter(function(t){return t.status==='Needs Care';}).length,c:'#ef4444'}];
    var barData=[{t:'Watering',v:47},{t:'Planting',v:12},{t:'Maint.',v:23},{t:'Protect',v:18}];
    var tt={contentStyle:{background:'#1a1a1a',border:'1px solid #333',borderRadius:'8px',color:'#fff',fontSize:'12px'}};
    var grid=Cr.createElement(RC.CartesianGrid,{strokeDasharray:'3 3',stroke:'#333'});
    var cl=div.querySelector('#cl');if(cl)CrD.render(Cr.createElement(RC.ResponsiveContainer,{width:'100%',height:190},Cr.createElement(RC.LineChart,{data:lineData},grid,Cr.createElement(RC.XAxis,{dataKey:'m',stroke:'#666',fontSize:11}),Cr.createElement(RC.YAxis,{stroke:'#666',fontSize:11}),Cr.createElement(RC.Tooltip,tt),Cr.createElement(RC.Line,{type:'monotone',dataKey:'v',stroke:LIME,strokeWidth:2.5,dot:{fill:LIME,r:4}}))),cl);
    var cp=div.querySelector('#cp');if(cp)CrD.render(Cr.createElement(RC.ResponsiveContainer,{width:'100%',height:190},Cr.createElement(RC.PieChart,null,Cr.createElement(RC.Pie,{data:pieData,cx:'50%',cy:'50%',innerRadius:50,outerRadius:80,dataKey:'v'},...pieData.map(function(d,i){return Cr.createElement(RC.Cell,{key:i,fill:d.c});})),Cr.createElement(RC.Tooltip,tt))),cp);
    var cb=div.querySelector('#cb');if(cb)CrD.render(Cr.createElement(RC.ResponsiveContainer,{width:'100%',height:170},Cr.createElement(RC.BarChart,{data:barData},grid,Cr.createElement(RC.XAxis,{dataKey:'t',stroke:'#666',fontSize:11}),Cr.createElement(RC.YAxis,{stroke:'#666',fontSize:11}),Cr.createElement(RC.Tooltip,tt),Cr.createElement(RC.Bar,{dataKey:'v',fill:LIME,radius:[4,4,0,0]}))),cb);
  },300);
  return div;
}

R();
})();
